<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BracketBetLab | Written Picks & NCAA Tournament Analysis</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fa;
      color: white;
      text-align: center;
    }

    /* Header with gradient */
    header {
      position: relative;
      background: linear-gradient(135deg, #003A8F 0%, #C8102E 100%);
      color: white;
      padding: 80px 20px 60px 20px;
      z-index: 2;
      overflow: hidden;
    }

    header h1 {
      margin: 0;
      font-size: 52px;
      letter-spacing: 2px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
      position: relative;
      z-index: 3;
    }

    /* Hero image overlap */
    .hero-image-wrapper {
      position: relative;
      display: inline-block;
      margin-top: -80px; /* overlap header */
      max-width: 90%;
      border-radius: 14px;
      overflow: hidden;
      z-index: 1;
    }

    .hero-image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Gradient overlay on hero image */
    .hero-image-wrapper::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top right, rgba(0,58,143,0.4), rgba(200,16,46,0.3));
      pointer-events: none;
      border-radius: 14px;
    }

    /* Main title under image */
    .main-title {
      color: #FFD700; /* gold */
      font-size: 32px;
      margin: 40px 20px 60px 20px;
      font-weight: bold;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }

    footer {
      background: #003A8F;
      color: white;
      padding: 20px;
      font-size: 14px;
      margin-top: 40px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<header>
  <h1>BracketBetLab</h1>
</header>

<div class="hero-image-wrapper">
  <img src="desk-setup.jpg" alt="Analyst at computer with basketball and data screens">
</div>

<div class="main-title">
  Written Picks and NCAA Tournament Analysis
</div>

<footer>
  © 2026 BracketBetLab.com • NCAA Basketball Analysis
</footer>

</body>
</html>
